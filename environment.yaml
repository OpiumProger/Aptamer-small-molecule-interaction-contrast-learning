# Conda-окружение для основного пайплайна Contrast Learning
# Создание:  conda env create -f environment.yaml
# Активация: conda activate contrast-learning

name: contrast-learning

channels:
  - pytorch
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip

  # PyTorch (CPU; для GPU замените на pytorch-cuda при необходимости)
  - pytorch>=2.0
  - torchvision
  - torchaudio


  - numpy>=1.24
  - pandas>=2.0
  - scipy>=1.10
  - scikit-learn>=1.3
  - matplotlib>=3.7
  - tqdm>=4.65

  - pip:
      # Transformers + эмбеддинги (GENA-LM, ChemBERTa)
      - transformers>=4.36
      - safetensors>=0.4
      - huggingface-hub>=0.20
      - tokenizers>=0.15

      # Визуализация embedding-пространства
      - umap-learn>=0.5

      # GRU / метрики
      - python-Levenshtein>=0.21

      # Wasserstein-анализ (wasserstein_utils.py)
      - POT>=0.9

# ---------------------------------------------------------------------------
# НЕ входит в это окружение (ставить отдельно):
#   - boltz          → CLI Boltz-2, отдельный conda env
#   - vina / openbabel / py3Dmol → докинг в Google Colab
#   - RSAPred        → внешний веб-сервис
# ---------------------------------------------------------------------------
